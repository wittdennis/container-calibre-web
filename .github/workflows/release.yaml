name: github-release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Use auto to auto calculate version
        default: auto
        required: false
        type: string

jobs:
  release:
    uses: wittdennis/pipelines/.github/workflows/cog-release.yaml@c6718b5723b2e69baff45a33d27313f326954b3a # 2.0.39
    with:
      version: ${{ inputs.version }}
    secrets:
      release-token: ${{ secrets.RELEASE_TOKEN }}
